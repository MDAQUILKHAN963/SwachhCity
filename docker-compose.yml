version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: swachhcity-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: swachhcity
    networks:
      - swachhcity-network

  redis:
    image: redis:7-alpine
    container_name: swachhcity-redis
    ports:
      - "6379:6379"
    networks:
      - swachhcity-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swachhcity-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/swachhcity
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - swachhcity-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: swachhcity-ml
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models
    networks:
      - swachhcity-network

volumes:
  mongodb_data:
  ml_models:

networks:
  swachhcity-network:
    driver: bridge
